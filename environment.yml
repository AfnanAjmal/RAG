name: rag-env
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch (CPU build for Intel Mac)
  - pytorch==2.2.2
  - torchvision==0.17.2
  - cpuonly                  # No CUDA on Intel Mac

  - pip:
    - langchain==0.3.7
    - langchain-community==0.3.7
    - langchain-huggingface==0.1.2
    - chromadb==0.5.18
    - sentence-transformers==3.3.1
    - python-dotenv==1.0.1
    - huggingface-hub==0.26.2